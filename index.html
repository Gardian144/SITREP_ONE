<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SITREP-ONE // COMMAND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=JetBrains+Mono&display=swap');
        body { background: #000; color: #00ff66; font-family: 'JetBrains Mono'; margin: 0; height: 100vh; overflow: hidden; }
        #map { height: 100%; width: 100%; filter: brightness(0.7) contrast(1.2); }
        
        /* Effet de Scan Radar */
        .radar-line { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: rgba(0, 255, 102, 0.2); box-shadow: 0 0 15px #00ff66; z-index: 1000; pointer-events: none; animation: scan 4s linear infinite; }
        @keyframes scan { from { top: 0%; } to { top: 100%; } }

        .kinetic { animation: pulse 1s infinite alternate; background: #ff003c; border-radius: 50%; box-shadow: 0 0 10px #ff003c; }
        @keyframes pulse { from { opacity: 0.4; transform: scale(0.8); } to { opacity: 1; transform: scale(1.2); } }
        
        .ui-panel { background: rgba(0, 10, 0, 0.85); border: 1px solid #004411; backdrop-filter: blur(5px); }
    </style>
</head>
<body class="flex flex-col">
    <div class="radar-line"></div>
    
    <header class="p-2 ui-panel flex justify-between items-center z-[1001]">
        <div class="flex items-center gap-2">
            <div class="w-2 h-2 bg-red-600 rounded-full animate-ping"></div>
            <h1 style="font-family: 'Orbitron'" class="text-[10px] md:text-xs">SITREP // GLOBAL_OPS</h1>
        </div>
        <div class="flex gap-2">
            <span id="clock" class="text-[9px] border border-green-900 px-2 py-1">00:00:00</span>
            <a href="france.html" class="bg-blue-900 text-white text-[9px] px-2 py-1 font-bold">FRANCE 🇫🇷</a>
        </div>
    </header>

    <main class="relative flex-grow">
        <div id="map"></div>
        <div class="absolute bottom-4 left-4 z-[1000] ui-panel p-2 w-48 hidden md:block">
            <h2 class="text-[9px] font-bold border-b border-green-900 mb-1">INTEL_STREAM</h2>
            <div id="mini-feed" class="text-[8px] space-y-1 max-h-32 overflow-hidden"></div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {zoomControl: false, attributionControl: false}).setView([28, 40], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        async function sync() {
            try {
                // Le "?v=" + Date.now() force l'actualisation sur ton téléphone
                const res = await fetch('data.json?v=' + Date.now());
                const data = await res.json();
                
                map.eachLayer(l => { if(l instanceof L.CircleMarker || l instanceof L.Marker) map.removeLayer(l); });

                data.recent.forEach(ev => {
                    L.circleMarker([ev.lat, ev.lng], {radius: 6, className: 'kinetic', stroke: false}).addTo(map);
                });

                data.navy.forEach(n => {
                    L.marker([n.lat, n.lng], {icon: L.divIcon({html: '🚢', className: 'text-xl'})}).addTo(map);
                });

                document.getElementById('clock').innerText = "SYNC: " + data.last_update;
            } catch(e) { console.log("Reconnecting..."); }
        }

        setInterval(sync, 10000); 
        sync();
    </script>
</body>
</html>
