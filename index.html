<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SITREP-ONE | GLOBAL TACTICAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=JetBrains+Mono&display=swap');
        body { background: #050507; color: #00ff66; font-family: 'JetBrains Mono'; margin: 0; overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #000; }
        .kinetic-marker { animation: pulse-red 1.5s infinite; background: #ff0000; border: 2px solid white; border-radius: 50%; }
        .base-marker { color: #00f2ff; font-weight: bold; font-size: 14px; text-shadow: 0 0 8px #00f2ff; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.8); } 100% { box-shadow: 0 0 0 15px rgba(255, 0, 0, 0); } }
        .header-ui { position: absolute; top: 10px; left: 10px; z-index: 1000; background: rgba(0,0,0,0.8); border: 1px solid #00ff66; padding: 10px; }
    </style>
</head>
<body>
    <div class="header-ui">
        <h1 style="font-family: Orbitron" class="text-xs">SITREP-ONE // GLOBAL_OPS</h1>
        <div id="stats" class="text-[9px] mt-1 text-zinc-400">SYNCING SATELLITES...</div>
        <a href="france.html" class="inline-block mt-2 text-[10px] bg-blue-900 px-2 py-1 text-white border border-blue-400">UNITE FRANCE 🇫🇷</a>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([25.0, 45.0], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        async function update() {
            const res = await fetch('data.json?u=' + Date.now());
            const data = await res.json();
            document.getElementById('stats').innerText = `${data.recent.length} IMPACTS DÉTECTÉS | ${data.last_update}`;

            map.eachLayer(l => { if(l instanceof L.Marker || l instanceof L.CircleMarker) map.removeLayer(l); });

            // BASES MILITAIRES
            data.intel.bases.forEach(b => {
                const icon = L.divIcon({ html: `▲`, className: 'base-marker' });
                L.marker([b.lat, b.lng], {icon: icon}).addTo(map)
                 .bindTooltip(`<b>${b.name}</b><br>AIR_FORCE: ${b.assets}`);
            });

            // IMPACTS / MISSILES (NASA)
            data.recent.forEach(ev => {
                L.circleMarker([ev.lat, ev.lng], {
                    radius: 7, className: 'kinetic-marker'
                }).addTo(map).bindTooltip(`<b class="text-red-500">KINETIC IMPACT</b><br>${ev.time} UTC`);
            });

            // NAVIRES
            data.navy.forEach(n => {
                const icon = L.divIcon({ html: `🚢`, className: 'text-xl' });
                L.marker([n.lat, n.lng], {icon: icon}).addTo(map).bindTooltip(`<b>${n.name}</b>`);
            });
        }
        setInterval(update, 30000); update();
    </script>
</body>
</html>
