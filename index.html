<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { background: #000; color: #00ff66; font-family: monospace; height: 100vh; display: flex; flex-direction: column; }
        #map { flex-grow: 1; background: #000 !important; }
        .panel { border: 1px solid #004411; background: rgba(0,0,0,0.8); }
        .marker-red { background: red; border-radius: 50%; box-shadow: 0 0 10px red; animation: p 1s infinite alternate; }
        @keyframes p { from { opacity: 0.4; } to { opacity: 1; } }
    </style>
</head>
<body class="p-2 gap-2">
    <header class="panel p-3 flex justify-between items-center border-t-0 border-x-0 border-b-2 border-green-600">
        <h1 class="font-bold tracking-widest text-sm">SITREP-ONE // OPS_CENTER</h1>
        <div class="flex gap-4 items-center">
            <span id="ut" class="text-[10px]">SYNCING...</span>
            <a href="france.html" class="bg-blue-900 text-white text-[10px] px-2 py-1">FRANCE 🇫🇷</a>
        </div>
    </header>

    <div class="flex flex-grow gap-2 overflow-hidden">
        <aside class="w-64 panel p-3 hidden md:block">
            <h2 class="text-red-500 text-[10px] font-bold mb-4">LIVE_ALERTS (24H)</h2>
            <div id="feed" class="text-[9px] space-y-2 overflow-y-auto h-full"></div>
        </aside>
        <div id="map" class="panel"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {zoomControl: false, attributionControl: false}).setView([25, 45], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        async function up() {
            const r = await fetch('data.json?v=' + Date.now());
            const d = await r.json();
            document.getElementById('ut').innerText = "LAST_UPDATE: " + d.last;
            const f = document.getElementById('feed'); f.innerHTML = '';
            map.eachLayer(l => { if(l instanceof L.CircleMarker) map.removeLayer(l); });

            d.alerts.forEach(a => {
                f.innerHTML += `<div class="border-l border-red-600 p-1 mb-2 bg-red-900/10">IMPACT @ ${a.t}</div>`;
                L.circleMarker([a.lat, a.lng], {radius: 5, color: 'red', className: 'marker-red'}).addTo(map);
            });
        }
        up(); setInterval(up, 30000);
    </script>
</body>
</html>
