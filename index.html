<!DOCTYPE html>
<html>
<head>
    <title>SITREP-ONE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { background: #050507; color: #00ff66; font-family: monospace; }
        #map { height: 80vh; width: 100%; background: #000; border: 1px solid #004411; }
        .kinetic { animation: pulse 1.5s infinite; background: red; border-radius: 50%; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255,0,0,0.7); } 100% { box-shadow: 0 0 0 10px rgba(255,0,0,0); } }
    </style>
</head>
<body class="p-4">
    <div class="flex justify-between mb-4">
        <h1>SITREP-ONE // GLOBAL</h1>
        <a href="france.html" class="bg-blue-900 px-2 py-1 border border-blue-400 text-white text-xs">MODE FRANCE 🇫🇷</a>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false }).setView([25, 45], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        async function load() {
            const res = await fetch('data.json');
            const data = await res.json();
            
            // Bases (Triangles bleus)
            data.bases.forEach(b => {
                L.marker([b.lat, b.lng], { icon: L.divIcon({html:'<b style="color:#00f2ff">▲</b>', className:''}) })
                 .addTo(map).bindTooltip(b.name);
            });

            // NASA (Cercles rouges)
            data.recent.forEach(r => {
                L.circleMarker([r.lat, r.lng], { radius: 6, className: 'kinetic', color: 'red' }).addTo(map);
            });
        }
        load();
    </script>
</body>
</html>
