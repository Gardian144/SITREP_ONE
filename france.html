<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>EMA // DISPOSITIF NATIONAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { background: #020617; color: #93c5fd; font-family: 'JetBrains Mono', monospace; height: 100vh; overflow: hidden; }
        .panel-blue { border: 1px solid #1e3a8a; background: rgba(15, 23, 42, 0.8); }
        #map { height: 100%; background: #010409 !important; }
        .gan-marker { animation: pulse-b 2s infinite; background: #fff; border: 2px solid #0055a4; border-radius: 50%; }
        @keyframes pulse-b { 0% { box-shadow: 0 0 0 0 rgba(0, 85, 164, 0.7); } 100% { box-shadow: 0 0 0 15px rgba(0, 85, 164, 0); } }
    </style>
</head>
<body class="flex flex-col p-2 gap-2">
    <header class="p-3 panel-blue flex justify-between items-center border-b-2 border-blue-600">
        <h1 class="text-xs font-bold tracking-widest text-white uppercase">EMA // DISPOSITIF NATIONAL</h1>
        <a href="index.html" class="bg-blue-600 px-3 py-1 text-[10px] text-white">RETOUR GLOBAL</a>
    </header>

    <div class="flex flex-grow gap-2 overflow-hidden">
        <aside class="w-1/3 flex flex-col gap-2">
            <div class="panel-blue p-3 flex-grow overflow-y-auto">
                <h2 class="text-[10px] font-bold text-blue-400 mb-4 uppercase">Ordre de Bataille</h2>
                <div id="list" class="space-y-3"></div>
            </div>
            <div class="panel-blue p-3 h-32 text-[9px]">
                <h3 class="font-bold text-white mb-1">NOTE STRATÉGIQUE</h3>
                <p id="strat-note">Chargement des données...</p>
            </div>
        </aside>
        <main class="flex-grow panel-blue overflow-hidden">
            <div id="map"></div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {zoomControl: false, attributionControl: false}).setView([30, 25], 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        async function update() {
            const res = await fetch('data.json?u=' + Date.now());
            const data = await res.json();
            const list = document.getElementById('list');
            list.innerHTML = '';
            
            data.navy.forEach(n => {
                const isCDG = n.name.includes("Charles");
                list.innerHTML += `<div class="p-3 bg-blue-900/10 border-l-2 border-blue-400 mb-2">
                    <div class="flex justify-between font-bold text-white text-[11px]">
                        <span>${n.name}</span>
                        <span class="bg-blue-700 px-1 text-[8px]">${n.status}</span>
                    </div>
                    <div class="text-[9px] text-blue-300 mt-1">${n.type}</div>
                </div>`;
                
                L.circleMarker([n.lat, n.lng], {radius: isCDG ? 10 : 7, className: isCDG ? 'gan-marker' : ''})
                 .addTo(map).bindTooltip(n.name, {permanent: true, direction: 'top', className:'bg-transparent border-0 text-white text-[10px]'});
            });

            document.getElementById('strat-note').innerText = `GAN Charles de Gaulle en route. Arrivée zone estimée à J-9. Vigilance accrue Mer Rouge.`;
        }
        update();
    </script>
</body>
</html>
