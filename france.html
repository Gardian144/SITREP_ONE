<!DOCTYPE html>
<html>
<head>
    <title>FRANCE OPS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { background: #020617; color: #93c5fd; font-family: monospace; }
        #map { height: 70vh; background: #000 !important; border: 1px solid #1e3a8a; }
        .ship { background: #fff; border: 2px solid #0055a4; border-radius: 50%; animation: pulse-b 2s infinite; }
        @keyframes pulse-b { 0% { box-shadow: 0 0 0 0 rgba(0,85,164,0.7); } 100% { box-shadow: 0 0 0 15px rgba(0,85,164,0); } }
    </style>
</head>
<body class="p-4">
    <div class="flex justify-between mb-4">
        <h1 class="font-bold">EMA // DISPOSITIF NATIONAL</h1>
        <a href="index.html" class="text-xs border border-blue-500 px-2 py-1">RETOUR GLOBAL</a>
    </div>
    <div id="map" class="mb-4"></div>
    <div id="list" class="grid grid-cols-2 gap-2 text-[10px]"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false }).setView([30, 20], 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        async function load() {
            const res = await fetch('data.json');
            const data = await res.json();
            const list = document.getElementById('list');

            data.navy.forEach(s => {
                list.innerHTML += `<div class="p-2 bg-blue-900/20 border-l-2 border-blue-500"><b>${s.name}</b><br>${s.status}</div>`;
                L.circleMarker([s.lat, s.lng], { radius: 8, className: 'ship' }).addTo(map).bindTooltip(s.name, {permanent:true});
            });
        }
        load();
    </script>
</body>
</html>
