<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SITREP-ONE | FRENCH FORCES MONITOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root { --marine-blue: #002147; --action-blue: #0055a4; }

        body { 
            background: #020617; color: #93c5fd; 
            font-family: 'JetBrains Mono', monospace; 
            margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
        }

        .panel-marine { background: rgba(15, 23, 42, 0.95); border: 1px solid #1e3a8a; }
        #map { height: 100%; width: 100%; background: #010409 !important; }

        /* Animation spécifique pour le Porte-Avions */
        .gan-marker { animation: sonar 3s infinite; border-radius: 50%; background: #ffffff; border: 2px solid #0055a4; }
        @keyframes sonar { 0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.5); } 100% { box-shadow: 0 0 0 20px rgba(0, 85, 164, 0); } }

        .ship-label { 
            background: #0055a4; color: white; border: 1px solid #93c5fd; 
            font-size: 9px; padding: 2px 6px; font-weight: bold;
        }

        .status-badge { font-size: 8px; padding: 1px 4px; border-radius: 3px; text-transform: uppercase; }
        .status-transit { background: #f59e0b; color: #000; }
        .status-deployed { background: #10b981; color: #000; }
    </style>
</head>
<body class="p-2 gap-2">

    <header class="flex justify-between items-center p-3 panel-marine border-b-2 border-blue-600 shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-blue-600 rounded-full animate-pulse shadow-[0_0_10px_#2563eb]"></div>
            <h1 style="font-family: 'Orbitron';" class="text-xs md:text-sm tracking-widest uppercase">EMA // DISPOSITIF NATIONAL</h1>
        </div>
        <div class="flex gap-2">
            <span class="text-[9px] bg-blue-900/50 px-2 py-1 border border-blue-500/30">H-24 STATUS: OPS</span>
            <a href="index.html" class="bg-blue-600 hover:bg-blue-500 text-white text-[9px] px-3 py-1 font-bold transition-all uppercase">Retour Global</a>
        </div>
    </header>

    <main class="grid grid-cols-12 gap-2 flex-grow overflow-hidden">
        <aside class="col-span-12 md:col-span-4 flex flex-col gap-2 overflow-hidden">
            <div class="panel-marine p-3 flex flex-col overflow-hidden h-full">
                <h2 class="text-[10px] font-bold text-blue-400 border-b border-blue-900 pb-2 mb-4 uppercase">Groupe Aéronaval & Forces</h2>
                
                <div id="assets-list" class="space-y-4 overflow-y-auto pr-2">
                    </div>

                <div class="mt-auto pt-4 border-t border-blue-900/50">
                    <div class="bg-blue-900/20 p-2 border-l-2 border-blue-400">
                        <p class="text-[9px] font-bold text-white uppercase">Note Stratégique</p>
                        <p class="text-[8px] text-blue-300/70 leading-relaxed mt-1">
                            Arrivée du GAN (CdG) prévue zone MEDOR sous 7-10 jours. Transit Atlantique-Méditerranée en cours.
                        </p>
                    </div>
                </div>
            </div>
        </aside>

        <section class="col-span-12 md:col-span-8 panel-marine relative overflow-hidden">
            <div id="map"></div>
            <div class="absolute bottom-4 right-4 z-[1001] bg-black/80 p-2 border border-blue-500/30 text-[9px]">
                COORD_LAT/LNG: <span id="mouse-coords" class="text-white">0.00, 0.00</span>
            </div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([38.0, 15.0], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        async function updateFrance() {
            try {
                const res = await fetch('data.json?u=' + Date.now());
                const data = await res.json();
                
                const list = document.getElementById('assets-list');
                list.innerHTML = '';
                
                // Nettoyer la carte
                map.eachLayer(l => { if(l instanceof L.Marker || l instanceof L.CircleMarker) map.removeLayer(l); });

                // On boucle sur les navires du JSON
                data.navy.forEach(ship => {
                    const isCdG = ship.name.includes("Charles de Gaulle");
                    
                    // Ajout à la liste de gauche
                    list.innerHTML += `
                        <div class="p-2 bg-slate-900/50 border border-slate-800 hover:border-blue-500 transition-colors">
                            <div class="flex justify-between items-start mb-1">
                                <span class="text-[10px] font-bold text-white uppercase">${ship.name}</span>
                                <span class="status-badge ${isCdG ? 'status-transit' : 'status-deployed'}">${isCdG ? 'En Transit' : 'Posté'}</span>
                            </div>
                            <p class="text-[9px] text-blue-400/80">${ship.type}</p>
                            <p class="text-[8px] text-zinc-500 mt-1 font-mono">${ship.lat.toFixed(2)}N, ${ship.lng.toFixed(2)}E</p>
                        </div>
                    `;

                    // Ajout sur la carte
                    const marker = L.circleMarker([ship.lat, ship.lng], {
                        radius: isCdG ? 8 : 6,
                        className: isCdG ? 'gan-marker' : 'asset-marker',
                        color: '#93c5fd',
                        fillOpacity: 1
                    }).addTo(map);

                    marker.bindTooltip(ship.name, { 
                        permanent: true, 
                        className: 'ship-label', 
                        direction: 'top', 
                        offset: [0, -10] 
                    });
                });

            } catch(e) { console.error("Erreur sync France"); }
        }

        map.on('mousemove', e => {
            document.getElementById('mouse-coords').innerText = `${e.latlng.lat.toFixed(2)}, ${e.latlng.lng.toFixed(2)}`;
        });

        setInterval(updateFrance, 30000);
        updateFrance();
    </script>
</body>
</html>
