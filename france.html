<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { background: #010409; color: #93c5fd; font-family: monospace; height: 100vh; display: flex; flex-direction: column; }
        #map { flex-grow: 1; background: #000 !important; }
        .panel-b { border: 1px solid #1e3a8a; background: #020617; }
        .ship-dot { background: #fff; border: 2px solid #0055a4; border-radius: 50%; box-shadow: 0 0 15px #0055a4; }
    </style>
</head>
<body class="p-2 gap-2">
    <header class="panel-b p-3 flex justify-between items-center border-b-2 border-blue-600">
        <h1 class="text-xs font-bold uppercase tracking-widest text-white">EMA // DISPOSITIF NATIONAL</h1>
        <a href="index.html" class="bg-slate-800 text-[10px] px-3 py-1 border border-blue-500">RETOUR QG</a>
    </header>

    <div class="flex flex-grow gap-2 overflow-hidden flex-col md:row">
        <aside class="md:w-1/3 flex flex-col gap-2">
            <div class="panel-b p-4 flex-grow overflow-y-auto">
                <h2 class="text-[10px] text-blue-400 font-bold mb-4 uppercase">Groupe Aéronaval & Forces</h2>
                <div id="list" class="space-y-4"></div>
            </div>
            <div class="panel-b p-3 text-[9px] text-blue-300">
                <b class="text-white">NOTE STRATÉGIQUE</b><br>
                Surveillance accrue zone MEDOR et Mer Rouge.
            </div>
        </aside>
        <div id="map" class="panel-b"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {zoomControl: false, attributionControl: false}).setView([30, 25], 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        async function up() {
            const r = await fetch('data.json?v=' + Date.now());
            const d = await r.json();
            const l = document.getElementById('list'); l.innerHTML = '';
            map.eachLayer(m => { if(m instanceof L.CircleMarker) map.removeLayer(m); });

            d.units.forEach(u => {
                l.innerHTML += `<div class="p-3 bg-blue-900/10 border-l-2 border-blue-500">
                    <div class="flex justify-between font-bold text-white text-[11px]">
                        <span>${u.n}</span> <span class="text-[8px] bg-blue-700 px-1">${u.s}</span>
                    </div>
                    <div class="text-[9px] text-blue-400 mt-1">${u.type}</div>
                </div>`;
                L.circleMarker([u.lat, u.lng], {radius: 8, className: 'ship-dot'}).addTo(map).bindTooltip(u.n);
            });
        }
        up();
    </script>
</body>
</html>
