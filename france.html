<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { background: #010409; color: #93c5fd; font-family: monospace; }
        .header-blue { border-bottom: 2px solid #1e3a8a; background: #020617; }
        .card-blue { border: 1px solid #1e3a8a; background: rgba(10, 25, 50, 0.5); }
        #map { background: #000 !important; height: calc(100vh - 60px); }
        .ship-marker { background: #fff; border: 2px solid #0055a4; border-radius: 50%; box-shadow: 0 0 15px #0055a4; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden p-2 gap-2">
    <header class="header-blue p-3 flex justify-between items-center card-blue border-t-0 border-x-0">
        <h1 class="text-xs font-bold tracking-widest text-white uppercase">EMA // DISPOSITIF NATIONAL</h1>
        <a href="index.html" class="text-[10px] bg-slate-800 border border-blue-500 px-3 py-1 text-white">RETOUR QG</a>
    </header>

    <div class="flex flex-1 gap-2 overflow-hidden">
        <aside class="w-1/3 flex flex-col gap-2">
            <div class="card-blue flex-1 p-4 overflow-y-auto">
                <h2 class="text-blue-400 text-[10px] font-bold mb-4 uppercase">Groupe Aéronaval & Forces</h2>
                <div id="unit-list" class="space-y-4"></div>
            </div>
            <div class="card-blue p-3 text-[10px] border-l-4 border-blue-500">
                <b class="text-white uppercase">Note de Renseignement</b><br>
                Surveillance active Mer Rouge / Transit GAN en cours.
            </div>
        </aside>
        <main class="flex-1 card-blue relative">
            <div id="map"></div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {zoomControl: false, attributionControl: false}).setView([30, 25], 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        async function update() {
            const r = await fetch('data.json?v=' + Date.now());
            const d = await r.json();
            const list = document.getElementById('unit-list'); list.innerHTML = '';
            
            d.units.forEach(u => {
                list.innerHTML += `<div class="p-3 bg-blue-900/10 border-l-2 border-blue-500 mb-2">
                    <div class="flex justify-between font-bold text-white text-[11px]">
                        <span>${u.n}</span><span class="text-[8px] bg-blue-600 px-1">${u.s}</span>
                    </div>
                    <div class="text-[9px] text-blue-300 mt-1">${u.t}</div>
                </div>`;
                L.circleMarker([u.lat, u.lng], {radius: 8, className: 'ship-marker'}).addTo(map).bindTooltip(u.n);
            });
        }
        update();
    </script>
</body>
</html>
