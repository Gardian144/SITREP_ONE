<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRANCE | NAVY TRACKER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=JetBrains+Mono&display=swap');
        body { background: #020617; color: #93c5fd; font-family: 'JetBrains Mono', monospace; height: 100vh; display: flex; flex-direction: column; }
        #map { height: 100%; width: 100%; background: #010409 !important; }
        .ship-label { background: #0055a4; color: white; border: 1px solid #93c5fd; font-size: 8px; padding: 2px 4px; }
        .gan-marker { animation: pulse-blue 2s infinite; border-radius: 50%; background: #fff; border: 2px solid #0055a4; }
        @keyframes pulse-blue { 0% { box-shadow: 0 0 0 0 rgba(0, 85, 164, 0.7); } 100% { box-shadow: 0 0 0 15px rgba(0, 85, 164, 0); } }
    </style>
</head>
<body class="p-2 gap-2">
    <header class="flex justify-between items-center p-3 border-b border-blue-900 bg-slate-900/80">
        <h1 style="font-family: Orbitron" class="text-xs tracking-tighter">EMA // NAVY_WATCH</h1>
        <a href="index.html" class="text-[9px] border border-blue-500 px-2 py-1 text-blue-400">RETOUR</a>
    </header>

    <main class="grid grid-cols-12 gap-2 flex-grow overflow-hidden">
        <aside class="col-span-12 md:col-span-4 bg-slate-900/50 p-3 border border-blue-900/30 overflow-y-auto">
            <h2 class="text-[10px] font-bold mb-4 text-blue-400">UNITÉS DÉPLOYÉES</h2>
            <div id="ship-list" class="space-y-3"></div>
        </aside>
        <section class="col-span-12 md:col-span-8 relative border border-blue-900/30">
            <div id="map"></div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([30.0, 20.0], 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        async function update() {
            const res = await fetch('data.json?u=' + Date.now());
            const data = await res.json();
            const list = document.getElementById('ship-list');
            list.innerHTML = '';
            
            map.eachLayer(l => { if(l instanceof L.CircleMarker) map.removeLayer(l); });

            data.navy.forEach(ship => {
                list.innerHTML += `
                    <div class="p-2 border-l-2 border-blue-500 bg-blue-900/10">
                        <div class="text-[10px] font-bold text-white">${ship.name}</div>
                        <div class="text-[8px] text-blue-400">${ship.status}</div>
                    </div>`;

                L.circleMarker([ship.lat, ship.lng], {
                    radius: 7, className: 'gan-marker'
                }).addTo(map).bindTooltip(ship.name, { permanent: true, className: 'ship-label', direction: 'top' });
            });
        }
        update();
        setInterval(update, 30000);
    </script>
</body>
</html>
